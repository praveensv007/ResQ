<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQ Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            

            background:
                linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)),
                url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1600&q=80") no-repeat center center fixed;

            background-size: cover;
        }

        .navbar {
            background: linear-gradient(90deg,
                    #111827,
                    #1e293b);
            padding: 15px 0;
            border-bottom: 2px solid #ef4444;
        }

        .navbar-brand {
            font-size: 28px;
            font-weight: 700;
            color: #ef4444;
        }

        .nav-link {
            color: white;
            margin-left: 15px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ef4444;
        }


        .login-container {
            min-height: calc(100vh - 56px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .title {
            text-align: center;
            margin-bottom: 25px;
        }

        .title h1 {
            color: #dc2626;
            font-weight: bold;
        }

        .btn-danger {
            width: 100%;
        }

        .signup-box {
            display: none;
        }

        a {
            text-decoration: none;
        }

        footer {
            background: #111827;
            padding: 20px;
            text-align: center;
            margin-top: 50px;
            color: #9ca3af;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark ">
        <div class="container">
            <a class="navbar-brand" href="#">ResQ</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="alert.html">Alerts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sos.html">SOS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="essentials.html"> Essentials</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="auth.html">Profile</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="login-container">

        <div class="login-box">

            <div id="loginForm">

                <div class="title">
                    <h1>ResQ</h1>
                    <p>Login Page</p>
                </div>

                <form id="loginData">

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="Enter Email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="loginPassword" minlength="8" maxlength="12"
                            placeholder="Enter Password" required>
                    </div>

                    <button type="button" class="btn btn-danger" onclick="loginAccount()">
                        Login
                    </button>

                </form>

                <p class="text-center mt-3">
                    Don't have an account?
                    <a href="#" onclick="showSignup()">Sign Up</a>
                </p>

            </div>

            <div id="signupForm" class="signup-box">

                <div class="title">
                    <h1>ResQ</h1>
                    <p>Sign Up Page</p>
                </div>

                <form id="signup">

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="signupName" minlength="5" placeholder="Enter Name" required pattern="[A-Za-z ]+" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="signupEmail" placeholder="Enter Email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="signupPassword" placeholder="Create Password"
                            minlength="8" maxlength="12" required>
                    </div>

                    <button type="button" class="btn btn-danger" onclick="createAccount()">
                        Create Account
                    </button>

                </form>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="#" onclick="showLogin()">Login</a>
                </p>

            </div>

        </div>

    </div>
    <footer>

        <p class="mb-0">
            © 2026 ResQ | Emergency Response System
        </p>

    </footer>
    <script>
        function showSignup() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("signupForm").style.display = "block";
        }

        function showLogin() {
            document.getElementById("signupForm").style.display = "none";
            document.getElementById("loginForm").style.display = "block";
        }

        function createAccount() {
            let name = document.getElementById("signupName");
            let email = document.getElementById("signupEmail");
            let password = document.getElementById("signupPassword");

            // Name validation
            if (!name.checkValidity()) {
                name.reportValidity();
                return;
            }

            // Name should contain only letters and spaces
            if (!/^[A-Za-z ]+$/.test(name.value.trim())) {
                name.setCustomValidity("Name should contain only letters and spaces");
                name.reportValidity();
                name.setCustomValidity("");
                return;
            } else {
                name.setCustomValidity("");
            }

            // Email validation
            if (!email.checkValidity()) {
                email.reportValidity();
                return;
            }

            // Password required / minlength / maxlength validation
            if (!password.checkValidity()) {
                password.reportValidity();
                return;
            }

            // Password must contain at least one letter, one digit, one special character, no spaces
            if (!/^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*()+-])\S{8,12}$/.test(password.value)) {
                password.setCustomValidity("Password must be 8-12 characters and include at least one letter, one digit, and one special character");
                password.reportValidity();
                password.setCustomValidity("");
                return;
            } else {
                password.setCustomValidity("");
            }

            alert("Account Created Successfully!");
            document.getElementById("signup").reset();
            showLogin();
        }

        function loginAccount() {
            let email = document.getElementById("loginEmail");
            let password = document.getElementById("loginPassword");

            // Email validation
            if (!email.checkValidity()) {
                email.reportValidity();
                return;
            }

            // Password required / minlength / maxlength validation
            if (!password.checkValidity()) {
                password.reportValidity();
                return;
            }

            // Password custom validation
            if (!/^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*()+-])\S{8,12}$/.test(password.value)) {
                password.setCustomValidity("Password must be 8-12 characters and include at least one letter, one digit, and one special character");
                password.reportValidity();
                password.setCustomValidity("");
                return;
            } else {
                password.setCustomValidity("");
            }

            alert("Logged In Successfully!");
            document.getElementById("loginData").reset();
        }
    </script>




</body>

</html>
