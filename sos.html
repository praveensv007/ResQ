<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ResQ SOS Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            color:white;
        }

        .navbar {
            background:linear-gradient(90deg, #111827, #1e293b );border-bottom:2px solid #ef4444;
            padding: 15px 0;
        }

        .navbar-brand {
            font-size: 28px;
            font-weight: 700;
            color: #ef4444;
        }

        .nav-link {
            color: white;
            margin-left: 15px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ef4444;
        }

        .header {
              
    color:#dc2626;
    padding:5px 0;
            text-align: center;
        }
       .card{
    border-radius:20px;
}

.form-control,
.form-select{
    height:50px;
}

textarea.form-control{
    height:auto;
}
        .sos-btn {
            width: 100%;
            height: 70px;
            font-size: 28px;
            font-weight: bold;
        }

        .status-box {
            background-color: #205087;
            padding: 15px;
            border-radius: 10px;
        }

        footer {
            background: #111827;
            padding: 20px;
            text-align: center;
            margin-top: 50px;
            color: #9ca3af;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">

        <div class="container">

            <a class="navbar-brand" href="#">
                ResQ
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="alert.html">
                            Alerts
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="sos.html">
                            SOS
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="login.html">
                            Profile
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <div class="header">
        <h1>DisasterLink SOS</h1>
        <p>Emergency Rescue Assistance</p>
    </div>

    <div class="container mt-4 form">
        <div class="row justify-content-center">
        <div class="col-lg-7">

        <div class="card p-4 shadow-lg border-0">

            <h3 class="mb-3">Emergency Details</h3>

            <div class="mb-3">
                <label>Name</label>
                <input type="text" class="form-control" id="name">
            </div>

            <div class="mb-3">
                <label>Phone Number</label>
                <input type="number" class="form-control" id="phone">
            </div>

            <div class="mb-3">
                <label>Emergency Type</label>

                <select class="form-select" id="emergency">
                    <option>Flood</option>
                    <option>Fire</option>
                    <option>Earthquake</option>
                    <option>Medical</option>
                    <option>Landslide</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Description</label>
                <textarea class="form-control" rows="3" id="desc"></textarea>
            </div>

            <button class="btn btn-primary mb-3" onclick="getLocation()">
                Get My Location
            </button>

            <p id="location">Location Not Found</p>

        </div>

        <div class="mt-4">
            <button class="btn btn-danger sos-btn" onclick="sendSOS()">
                🚨 SEND SOS ALERT
            </button>
        </div>

        <div class="status-box mt-4">
            <h4>Status</h4>
            <p id="status">Waiting for Alert...</p>
        </div>

        <div class="card p-2 mt-4 bg-success" >

            <h3 class="text-center">Emergency Contacts</h3>

            <div class="d-flex justify-content-center gap-3 mt-3 flex-wrap">

                <a href="tel:100" class="btn btn-dark">
                    Police
                </a>

                <a href="tel:108" class="btn btn-light">
                    Ambulance
                </a>

                <a href="tel:101" class="btn btn-danger">
                    Fire
                </a>

            </div>

        </div>

    </div></div>
</div>

    <footer>

        <p class="mb-0">
            © 2026 DisasterLink | Emergency Response System
        </p>

    </footer>

    <script>

        function getLocation() {

            if (navigator.geolocation) {

                navigator.geolocation.getCurrentPosition(showPosition);

            }
            else {

                document.getElementById("location").innerHTML =
                    "Geolocation not supported";

            }

        }

        function showPosition(position) {

            document.getElementById("location").innerHTML =
                "Latitude: " + position.coords.latitude +
                "<br>Longitude: " + position.coords.longitude;

        }

        function sendSOS() {

            let name = document.getElementById("name").value;

            let emergency = document.getElementById("emergency").value;

            if (name == "") {

                alert("Please Enter Name");

            }
            else {

                document.getElementById("status").innerHTML =
                    "SOS Alert Sent Successfully for " + emergency;

                alert("Emergency SOS Sent");

            }

        }

    </script>

</body>

</html>
