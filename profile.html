<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DisasterLink Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    

    <style>
        body{
            background-color:#0f172a;
            min-height:100vh;
            margin:0;
        }

         .navbar{
      background:linear-gradient(90deg,#111827,#1e293b );
      border-bottom:2px solid #ef4444;
      padding:15px 0;
    }

    .navbar-brand{
      font-size:28px;
      font-weight:700;
      color:#ef4444 ;
    }

    .nav-link{
      color:white ;
      margin-left:15px;
      transition:0.3s;
    }

    .nav-link:hover{
      color:#ef4444 ;
    }

        .login-container{
            min-height:calc(100vh - 56px);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .login-box{
            background:white;
            padding:30px;
            border-radius:10px;
            width:100%;
            max-width:400px;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }

        .title{
            text-align:center;
            margin-bottom:25px;
        }

        .title h1{
            color:#dc2626;
            font-weight:bold;
        }

        .btn-danger{
            width:100%;
        }

        .signup-box{
            display:none;
        }

        a{
            text-decoration:none;
        }
        footer{
      background:#111827;
      padding:20px;
      text-align:center;
      margin-top:50px;
      color:#9ca3af;
    }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">ResQ</a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="alert.html">Alerts</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="sos.html">SOS</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Profile</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="login-container">

        <div class="login-box">

            <div id="loginForm">

                <div class="title">
                    <h1>ResQ</h1>
                    <p>Login Page</p>
                </div>

                <form id="loginData">

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email"
                               class="form-control"
                               placeholder="Enter Email"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password"
                               class="form-control"
                               placeholder="Enter Password"
                               required>
                    </div>

                    <button type="button"
                            class="btn btn-danger"
                            onclick="loginAccount()">
                        Login
                    </button>

                </form>

                <p class="text-center mt-3">
                    Don't have an account?
                    <a href="#" onclick="showSignup()">Sign Up</a>
                </p>

            </div>

            <div id="signupForm" class="signup-box">

                <div class="title">
                    <h1>ResQ</h1>
                    <p>Sign Up Page</p>
                </div>

                <form id="signup">

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text"
                               class="form-control"
                               placeholder="Enter Name"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email"
                               class="form-control"
                               placeholder="Enter Email"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password"
                               class="form-control"
                               placeholder="Create Password"
                               minlength="8"
                               maxlength="10"
                               required>
                    </div>

                    <button type="button"
                            class="btn btn-danger"
                            onclick="createAccount()">
                        Create Account
                    </button>

                </form>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="#" onclick="showLogin()">Login</a>
                </p>

            </div>

        </div>

    </div>
    <footer>

    <p class="mb-0">
      © 2026 ResQ | Emergency Response System
    </p>

  </footer>

    <script>

        function showSignup() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("signupForm").style.display = "block";
        }

        function showLogin() {
            document.getElementById("signupForm").style.display = "none";
            document.getElementById("loginForm").style.display = "block";
        }

        function createAccount() {

            let form = document.getElementById("signup");

            if (form.reportValidity()) {
                alert("Account Created Successfully!");
            }
        }

        function loginAccount() {

            let form = document.getElementById("loginData");

            if (form.reportValidity()) {
                alert("Logged In Successfully!");
            }
        }

    </script>

</body>
</html>
